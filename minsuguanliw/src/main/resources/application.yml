# Tomcat
server:
    tomcat:
        uri-encoding: UTF-8
    port: 8080
    servlet:
        context-path: /minsuguanliw

spring:
    datasource:
        driverClassName: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://localhost:3306/minsuguanliw?useUnicode=true&characterEncoding=utf-8&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=GMT%2B8
        username: root
        password: 123456

    # 热部署配置
    devtools:
        restart:
            enabled: true
            additional-paths: src/main/resources/front
            exclude: static/**,upload/**
            poll-interval: 2000ms
            quiet-period: 1000ms

    servlet:
        multipart:
            max-file-size: 1000MB
            max-request-size: 1000MB

#mybatis
mybatis-plus:
    mapper-locations: classpath*:mapper/*.xml
    typeAliasesPackage: com.entity
    global-config:
        id-type: 1
        field-strategy: 2
        db-column-underline: true
        refresh-mapper: true
        logic-delete-value: -1
        logic-not-delete-value: 0
        sql-injector: com.baomidou.mybatisplus.mapper.LogicSqlInjector
    configuration:
        map-underscore-to-camel-case: true
        cache-enabled: false
        call-setters-on-nulls: true
        jdbc-type-for-null: 'null'

#打印sql语句
logging:
    level:
        com.dao: debug
